apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-com-cocktails-api-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cezzis-prd-secret-store
    kind: SecretStore
  target:
    name: cezzis-com-cocktails-api-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        Dapr__DaprAppToken: "{{ .daprioDaprApiToken }}"
        Dapr__AppApiToken: "{{ .daprioAppApiToken }}"
        Recaptcha__SiteSecret: "{{ .recaptchaSiteSecret }}"
  data:
    - secretKey: daprioDaprApiToken
      remoteRef:
        key: shared-daprio-dapr-api-token
    - secretKey: daprioAppApiToken
      remoteRef:
        key: shared-daprio-app-api-token
    - secretKey: recaptchaSiteSecret
      remoteRef:
        key: recaptcha-cezzi-site-secret

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-com-cocktails-api-shared-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shared-secret-store
    kind: SecretStore
  target:
    name: cezzis-com-cocktails-api-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        CosmosDb__ConnectionString: "AccountEndpoint=https://cosmosdb.azure-platform.svc.cluster.local:8081/;AccountKey={{ .cosmosDbAccountKey }};"
        OTel__OtlpExporter__Headers: "Authorization=Bearer {{ .otelApiKey }}"
        KAFKA_BOOTSTRAP_SERVERS: "kafka-broker-1.kafka-platform.svc.cluster.local:19092"
        RABBITMQ_CONNECTION_STRING: "amqp://cezzis-app-user-prd:{{ .rabbitmqAppPassword }}@rabbitmq.rabbitmq-platform.svc.cluster.local:5672/cezzis-prd"
  data:
    - secretKey: cosmosDbAccountKey
      remoteRef:
        key: azure-cosmosdb-account-key-onprem
    - secretKey: otelApiKey
      remoteRef:
        key: otel-collector-api-key-onprem
    - secretKey: rabbitmqAppPassword
      remoteRef:
        key: rabbitmq-app-password-onprem