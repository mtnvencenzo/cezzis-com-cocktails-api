apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-com-cocktails-api-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cezzis-prd-secret-store
    kind: SecretStore
  target:
    name: cezzis-com-cocktails-api-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        CosmosDb__ConnectionString: "{{ .cosmosDbConnectionString }}"
        Dapr__DaprAppToken: "{{ .daprioDaprApiToken }}"
        Dapr__AppApiToken: "{{ .daprioAppApiToken }}"
        Recaptcha__SiteSecret: "{{ .recaptchaSiteSecret }}"
  data:
    - secretKey: cosmosDbConnectionString
      remoteRef:
        key: cosmosdb-connection-string-onprem
    - secretKey: daprioDaprApiToken
      remoteRef:
        key: shared-daprio-dapr-api-token
    - secretKey: daprioAppApiToken
      remoteRef:
        key: shared-daprio-app-api-token
    - secretKey: recaptchaSiteSecret
      remoteRef:
        key: recaptcha-site-secret-onprem

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-com-cocktails-api-shared-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shared-secret-store
    kind: SecretStore
  target:
    name: cezzis-com-cocktails-api-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OTel__OtlpExporter__Headers: "Authorization=Bearer {{ .otelApiKey }}"
  data:
    - secretKey: otelApiKey
      remoteRef:
        key: otel-collector-api-key-onprem