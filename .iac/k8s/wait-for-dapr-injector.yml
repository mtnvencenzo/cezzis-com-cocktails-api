apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-dapr-injector
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "400"
spec:
  ttlSecondsAfterFinished: 120
  backoffLimit: 10
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app: wait-for-dapr-injector
    spec:
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for Dapr sidecar injector to be ready..."
              attempt=0
              until wget -q -O /dev/null --timeout=5 \
                "http://dapr-sidecar-injector.dapr-system.svc.cluster.local:9090/metrics" \
                2>/dev/null; do
                attempt=$((attempt + 1))
                echo "Attempt $attempt: Dapr injector not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Dapr sidecar injector is ready!"
